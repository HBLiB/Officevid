<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Officevid — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <div class="logo" aria-label="H-Network logo">
      <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <rect width="64" height="64" rx="12" fill="#4a6cf7"/>
        <text x="32" y="44" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="36" font-weight="700" fill="#fff">H</text>
      </svg>
      <span class="logo-text">H-Network</span>
    </div>
    <h1 id="form-title">Login</h1>
    <form id="auth-form" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" name="email" autocomplete="email" required>

      <label for="password">Password</label>
      <input id="password" type="password" name="password" autocomplete="current-password" required>

      <button type="submit" id="submit-btn">Login</button>
    </form>
    <p id="feedback" class="feedback" role="status"></p>
    <p class="toggle-text">
      <span id="toggle-prompt">Don't have an account?</span>
      <a href="#" id="toggle-link">Register</a>
    </p>
  </main>
  <script src="app.js"></script>
</body>
</html>
